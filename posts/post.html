<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <title>Diary Post</title>
  <style>
    body {
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f5f5f7;
      padding: 0 20px;

      -webkit-text-size-adjust: 100%;

      /* ★ 文字を小さめに（前の約1/2） */
      font-size: clamp(13px, 3vw, 17px);

      /* ★ 行間を広げて読みやすく */
      line-height: 1.95;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #111;
      line-height: 1.4;
    }

    /* ★ シンプルなBackボタン（左下固定） */
    .back-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 13px;
      color: #555;
      text-decoration: none;
      opacity: 0.8;
    }

    .back-btn:hover {
      opacity: 1;
    }

    .content {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      line-height: 1.95;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    .content p {
      margin-bottom: 1.3em;
    }
  </style>
</head>
<body>

  <!-- ★ シンプルなBackボタン -->
  <a class="back-btn" href="../index.html">

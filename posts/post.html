<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <title>私です私</title>
  <style>
    body {
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f5f5f7;
      padding: 0 20px;

      -webkit-text-size-adjust: 100%;
      font-size: clamp(13px, 3vw, 17px);
      line-height: 1.75;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #111;
      line-height: 1.4;
    }

    .back-btn {
      position: absolute;
      bottom: 10px;
      left: 12px;
      font-size: 13px;
      color: #555;
      text-decoration: none;
      opacity: 0.85;
    }

    .back-btn:hover {
      opacity: 1;
    }

    .content-wrapper {
      position: relative;
    }

    .content {
      background: #fff;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      position: relative;
      padding-bottom: 40px;
    }

    /* 段落（空行） */
    .para {
      margin: 1.1em 0;
      line-height: 1.75;
    }

    /* ★ 明示的な改行（狭い） */
    .linebreak {
      margin: 0.3em 0; /* ← 改行幅ここで調整 */
      line-height: 1.2;
    }
  </style>
</head>
<body>

  <div class="content-wrapper">
    <div class="content" id="content"></div>
    <a class="back-btn" href="../index.html">もどる</a>
  </div>

  <script>
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      if (!file) return;

      const url = `https://raw.githubusercontent.com/watashidesu-wa-ta-shi/diary/main/posts/${file}`;
      const res = await fetch(url);
      const md = await res.text();

      // ★ 改行処理（Windows/Mac両対応）
      let html = md
        // 見出し
        .replace(/^# (.*)$/gim, '<h1>$1</h1>')

        // 空行（段落）
        .replace(/\r?\n\r?\n/g, '</div><div class="para">')

        // 1行改行（狭い）
        .replace(/\r?\n/g, '</div><div class="linebreak">');

      // 最初と最後を段落で囲む
      html = `<div class="para">${html}</div>`;

      document.getElementById("content").innerHTML = html;
    }

    loadPost();
  </script>
</body>
</html>

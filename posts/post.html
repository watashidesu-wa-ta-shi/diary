<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <title>Diary Post</title>
  <style>
    body {
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f5f5f7;
      padding: 0 20px;

      -webkit-text-size-adjust: 100%;
      font-size: clamp(13px, 3vw, 17px);
      line-height: 1.75;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #111;
      line-height: 1.4;
    }

    /* ★ Backボタン（白いカードの左下に寄せる） */
    .back-btn {
      position: absolute;
      bottom: 10px;
      left: 12px;
      font-size: 13px;
      color: #555;
      text-decoration: none;
      opacity: 0.85;
    }

    .back-btn:hover {
      opacity: 1;
    }

    .content-wrapper {
      position: relative;
    }

    .content {
      background: #fff;
      padding: 18px; /* ← フチ狭め */
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      line-height: 1.75;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      position: relative;
      padding-bottom: 40px; /* ← Backボタンのスペース確保 */
    }

    .content p {
      margin-bottom: 1.1em;
    }

    /* ★ 改行幅を強制的に狭くする（1/4） */
    .content br {
      line-height: 0.3 !important; /* ← 親の line-height を上書き */
      display: block;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>

  <div class="content-wrapper">
    <div class="content" id="content"></div>
    <a class="back-btn" href="../index.html">もどる</a>
  </div>

  <script>
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      if (!file) return;

      const url = `https://raw.githubusercontent.com/watashidesu-wa-ta-shi/diary/main/posts/${file}`;
      const res = await fetch(url);
      const md = await res.text();

      // 壊れないMarkdownパーサー
      let html = md
        .replace(/^# (.*)$/gim, '<h1>$1</h1>')
        .replace(/^## (.*)$/gim, '<h2>$1</h2>')
        .replace(/^### (.*)$/gim, '<h3>$1</h3>')
        .replace(/\*\*(.*?)\*\*/gim, '<b>$1</b>')
        .replace(/\*(.*?)\*/gim, '<i>$1</i>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>');

      html = `<p>${html}</p>`;
      document.getElementById("content").innerHTML = html;
    }

    loadPost();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <title>Diary Post</title>
  <style>
    body {
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f5f5f7;
      padding: 0 20px;

      -webkit-text-size-adjust: 100%;

      /* 文字小さめ（読みやすい） */
      font-size: clamp(13px, 3vw, 17px);

      /* 行間広め */
      line-height: 1.95;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #111;
      line-height: 1.4;
    }

    /* Backボタン（左下固定・シンプル） */
    .back-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 13px;
      color: #555;
      text-decoration: none;
      opacity: 0.8;
    }

    .back-btn:hover {
      opacity: 1;
    }

    .content {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      line-height: 1.95;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    .content p {
      margin-bottom: 1.3em;
    }
  </style>
</head>
<body>

  <!-- シンプルなBackボタン -->
  <a class="back-btn" href="../index.html">＜ Back</a>

  <div class="content" id="content"></div>

  <script>
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      if (!file) return;

      const url = `https://raw.githubusercontent.com/watashidesu-wa-ta-shi/diary/main/posts/${file}`;
      const res = await fetch(url);
      const md = await res.text();

      // 壊れないMarkdownパーサー（安全版）
      let html = md
        // 見出し
        .replace(/^# (.*)$/gim, '<h1>$1</h1>')
        .replace(/^## (.*)$/gim, '<h2>$1</h2>')
        .replace(/^### (.*)$/gim, '<h3>$1</h3>')

        // 太字・斜体
        .replace(/\*\*(.*?)\*\*/gim, '<b>$1</b>')
        .replace(/\*(.*?)\*/gim, '<i>$1</i>')

        // 段落（空行2つ以上）
        .replace(/\n{2,}/g, '</p><p>')

        // 改行
        .replace(/\n/g, '<br>');

      // <p> で囲む
      html = `<p>${html}</p>`;

      document.getElementById("content").innerHTML = html;
    }

    loadPost();
  </script>
</body>
</html>

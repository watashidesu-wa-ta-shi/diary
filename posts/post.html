<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <title>Diary Post</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f5f5f7;
      padding: 0 20px;

      /* iOSの勝手な縮小を防ぐ */
      -webkit-text-size-adjust: 100%;

      /* 文字サイズを自然に調整（前より小さめ） */
      font-size: clamp(16px, 3.8vw, 20px);

      /* 行間を広げて読みやすく */
      line-height: 1.9;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
      line-height: 1.4;
    }

    a {
      text-decoration: none;
      color: #0366d6;
      font-size: 15px;
    }

    .content {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);

      /* 本文の行間をさらに読みやすく */
      line-height: 1.9;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    /* 段落間の余白を広げる */
    .content p {
      margin-bottom: 1.2em;
    }
  </style>
</head>
<body>
  <a href="../index.html">← 戻る</a>
  <div class="content" id="content"></div>

  <script>
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      if (!file) return;

      const url = `https://raw.githubusercontent.com/watashidesu-wa-ta-shi/diary/main/posts/${file}`;
      const res = await fetch(url);
      const md = await res.text();

      // Markdown → HTML変換（簡易版）
      const html = md
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
        .replace(/\*(.*)\*/gim, '<i>$1</i>')
        .replace(/\n\n/g, '</p><p>')   // 段落
        .replace(/\n/g, '<br>');       // 改行

      document.getElementById("content").innerHTML = `<p>${html}</p>`;
    }

    loadPost();
  </script>
</body>
</html>

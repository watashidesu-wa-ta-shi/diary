<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Diary Post</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f5f5f7;
      padding: 0 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #111;
    }
    a {
      text-decoration: none;
      color: #0366d6;
    }
    .content {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <a href="../index.html">← 戻る</a>
  <div class="content" id="content"></div>

  <script>
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      if (!file) return;

      const url = `https://raw.githubusercontent.com/watashidesu-wa-ta-shi/diary/main/posts/${file}`;
      const res = await fetch(url);
      const md = await res.text();

      // Markdown → HTML変換（簡易版）
      const html = md
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
        .replace(/\*(.*)\*/gim, '<i>$1</i>')
        .replace(/\n$/gim, '<br>');

      document.getElementById("content").innerHTML = html;
    }

    loadPost();
  </script>
</body>
</html>
